<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mochi Merge</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Fredoka',system-ui,sans-serif;min-height:100vh;color:#9c3f63;
    background:radial-gradient(130% 90% at 50% -10%, #ffe3b3 0%, #ffc8d6 42%, #f7a9c4 78%, #e98bb0 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
  .jar{display:flex;gap:8px;margin-bottom:26px}
  .m{width:46px;height:46px;border-radius:50%;position:relative}
  .m::after{content:"";position:absolute;left:30%;top:24%;width:22%;height:14%;border-radius:50%;background:rgba(255,255,255,.55)}
  .m1{background:#FF8FA3}.m2{background:#9BE3B4}.m3{background:#8FD3FF}.m4{background:#FFE08A}
  h1{font-size:50px;font-weight:700;letter-spacing:1px;color:#c1487a}
  p{font-weight:500;margin:10px 0 30px;color:#a23d68}
  a.btn{display:inline-block;margin:8px;padding:13px 28px;border-radius:30px;text-decoration:none;
    font-weight:600;background:#fff;color:#ff5d8f;box-shadow:0 8px 18px rgba(180,50,95,.25)}
  footer{margin-top:34px;font-size:13px;opacity:.75}
</style>
</head>
<body>
  <div class="jar"><div class="m m1"></div><div class="m m2"></div><div class="m m3"></div><div class="m m4"></div></div>
  <h1>Mochi Merge</h1>
  <p>Cute kawaii drop-and-merge puzzle.</p>
  <div>
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn" href="support.html">Support</a>
  </div>
  <footer>© 2026 Mochi Merge</footer>
</body>
</html>
