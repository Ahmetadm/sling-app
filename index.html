<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sling</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Space Grotesk',system-ui,sans-serif;min-height:100vh;color:#fff;
    background:linear-gradient(160deg,#7a2bf0,#ff466b);
    display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center}
  .ring{width:96px;height:96px;border-radius:50%;border:8px solid rgba(255,255,255,.9);position:relative;margin-bottom:28px}
  .ball{position:absolute;top:-12px;right:-10px;width:34px;height:34px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%,#ffe6a0,#ff5d5a);box-shadow:0 0 22px rgba(255,170,60,.9)}
  h1{font-size:54px;font-weight:700;letter-spacing:4px}
  p{opacity:.9;font-weight:500;margin:10px 0 30px}
  a.btn{display:inline-block;margin:8px;padding:13px 26px;border-radius:30px;text-decoration:none;
    font-weight:600;background:rgba(255,255,255,.95);color:#7a2bf0}
  footer{margin-top:34px;font-size:13px;opacity:.7}
</style>
</head>
<body>
  <div class="ring"><div class="ball"></div></div>
  <h1>SLING</h1>
  <p>One-tap orbit timing game.</p>
  <div>
    <a class="btn" href="privacy.html">Privacy Policy</a>
    <a class="btn" href="support.html">Support</a>
  </div>
  <footer>© 2026 Sling</footer>
</body>
</html>
